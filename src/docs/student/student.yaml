paths:
  /student:
    get:
      summary: Obtener todos los estudiantes
      tags:
        - Student
      responses:
        "200":
          description: Lista de estudiantes obtenida correctamente
        "500":
          description: Error interno del servidor

    post:
      summary: Crear estudiante
      tags:
        - Student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - age
              properties:
                name:
                  type: string
                  example: Juan Perez
                email:
                  type: string
                  example: juan@gmail.com
                age:
                  type: number
                  example: 20
      responses:
        "201":
          description: Estudiante creado correctamente
        "400":
          description: Error en los datos
        "500":
          description: Error interno del servidor

  /student/{id}:
    get:
      summary: Obtener estudiante por ID
      tags:
        - Student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Estudiante encontrado
        "400":
          description: ID inválido
        "404":
          description: Estudiante no encontrado

    put:
      summary: Actualizar estudiante
      tags:
        - Student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                age:
                  type: number
      responses:
        "200":
          description: Estudiante actualizado
        "400":
          description: ID inválido o datos incorrectos
        "404":
          description: Estudiante no encontrado

    delete:
      summary: Eliminar estudiante
      tags:
        - Student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Estudiante eliminado
        "400":
          description: ID inválido
        "404":
          description: Estudiante no encontrado